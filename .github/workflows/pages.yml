name: Deploy public/ to GitHub Pages

on:
  # 推送到 main 時自動發佈
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/pages.yml"
  # 允許在 Actions 分頁手動觸發
  workflow_dispatch:

# GitHub Pages 部署所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署,新的會取消排隊中的舊的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 若 repo 尚未啟用 Pages,讓 workflow 自動以「GitHub Actions」為來源啟用,
          # 免去手動到 Settings → Pages 設定的步驟
          enablement: true

      - name: Upload artifact (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
